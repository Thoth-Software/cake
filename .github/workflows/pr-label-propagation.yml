name: PR label propagation
on:
  pull_request:
    types: [opened, edited]

jobs:
  propagate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            // Match: close, closes, closed, fix, fixes, fixed, resolve, resolves, resolved
            const pattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const issueNumbers = [];
            let match;
            while ((match = pattern.exec(body)) !== null) {
              issueNumbers.push(parseInt(match[1], 10));
            }

            if (issueNumbers.length === 0) return;

            // Collect all labels from referenced issues, deduplicated
            const labelSet = new Set();
            for (const num of issueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                });
                for (const label of issue.labels) {
                  labelSet.add(typeof label === 'string' ? label : label.name);
                }
              } catch (e) {
                console.log(`Could not fetch issue #${num}: ${e.message}`);
              }
            }

            if (labelSet.size === 0) return;

            // PRs are issues in GitHub's API, so addLabels works
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [...labelSet],
            });
